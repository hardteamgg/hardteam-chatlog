<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Chatlog GTA RP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* VARIÁVEIS GLOBAIS DE ESTILO DO CHAT */
        :root {
            --chat-font-size: 15px;
            --chat-width: 100%;
            --chat-bg: transparent;
            --chat-text-opacity: 1;
            --chat-shadow: 
                -1px -1px 0 #000,  1px -1px 0 #000,
                -1px  1px 0 #000,  1px  1px 0 #000,
                0px -1px 0 #000,  0px  1px 0 #000,
                -1px  0px 0 #000,  1px  0px 0 #000;
        }

        body {
            background-color: #12161c;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: #C2A2DA; }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1300px;
        }

        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .character-setup {
            background-color: #1c2128;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #2d333b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .character-setup input {
            background-color: #2d333b;
            color: #e87777;
            border: 1px solid #444c56;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            outline: none;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background-color: #1c2128;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #2d333b;
        }

        .tool-btn {
            background-color: #0d1117;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }

        .tool-btn:hover { background-color: #161b22; border-color: #8b949e; }

        .btn-info { color: #58a6ff; border-color: #1a3d66; }
        .btn-fala { color: #ffffff; }
        .btn-me { color: #C2A2DA; border-color: #3b2e4a; }
        .btn-item { color: #33cc33; border-color: #1a4d1a; }
        .btn-cel { color: #FFD700; border-color: #4d4000; }
        .btn-sis { color: #ff6666; border-color: #4d1f1f; }
        .btn-ooc { color: #8b949e; border-color: #30363d; }

        /* PAINEL DE ESTILOS */
        .style-panel {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .style-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: #8b949e;
            margin-bottom: 5px;
        }

        .yellow-indicator {
            width: 4px;
            height: 14px;
            background-color: #df6262;
            border-radius: 2px;
        }

        .style-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .style-item {
            background-color: #0d1117;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .style-labels {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #8b949e;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .highlight-val { color: #e14343; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e85757;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #FFD700;
            cursor: pointer;
            border: none;
        }

        .slider-row { display: flex; align-items: center; gap: 10px; }
        
        .sq-btn {
            background-color: #21262d;
            color: #58a6ff;
            border: 1px solid #30363d;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .sq-btn:hover { background-color: #30363d; }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffffff;
            cursor: pointer;
        }
        .checkbox-label input { accent-color: #FFD700; cursor: pointer; }

        .color-picker {
            -webkit-appearance: none;
            border: 1px solid #444;
            width: 40px;
            height: 20px;
            padding: 0;
            border-radius: 3px;
            cursor: pointer;
        }
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border: none; border-radius: 2px; }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #1c2128;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 6px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus { border-color: #58a6ff; }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #render-box {
            display: inline-block;
            padding: 15px;
            border-radius: 4px;
            background-color: var(--chat-bg);
            width: var(--chat-width);
            box-sizing: border-box;
        }

        .chat-line {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 2px;
            font-size: var(--chat-font-size);
            text-shadow: var(--chat-shadow);
            opacity: var(--chat-text-opacity);
        }

        .color-normal { color: #FFFFFF; }
        .color-action { color: #C2A2DA; }
        .color-item { color: #33cc33; }
        .color-cel { color: #FFFF00; }
        .color-sis { color: #ff6666; }
        .color-ooc { color: #9ba4b5; }
        .color-info-tag { color: #58a6ff; }

        .preview-bg {
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), 
                              linear-gradient(-45deg, #222 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #222 75%), 
                              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: auto;
            min-height: 350px;
            display: flex;
            align-items: flex-start;
        }

        .download-btn {
            background-color: #238636;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
            margin-top: 10px;
        }

        .download-btn:hover { background-color: #2ea043; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: #1c2128; border: 1px solid #30363d; border-radius: 6px; padding: 20px; width: 450px; max-width: 90%; display: flex; flex-direction: column; gap: 15px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .modal-header h2 { margin: 0; color: #C2A2DA; font-size: 18px; }
        .close-btn { color: #8b949e; font-size: 24px; cursor: pointer; font-weight: bold; }
        .close-btn:hover { color: #fff; }
        #modal-char-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; }
        .manage-row { display: flex; gap: 10px; align-items: center; background-color: #0d1117; padding: 10px; border-radius: 6px; border: 1px solid #30363d; }
        .manage-row input { flex: 1; background-color: #2d333b; color: #FFD700; border: 1px solid #444c56; padding: 8px 10px; border-radius: 4px; font-weight: bold; outline: none; }
        .btn-delete-char { background-color: #da3633; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-delete-char:hover { background-color: #b32d2a; }
    </style>
</head>
<body>

    <h1>Hard Team | Chatlog Generator</h1>

    <div class="container">
        <div class="editor">
            
            <div id="characters-container" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <div class="character-setup" id="char-1" onclick="insertSpecificCharacter(this)" style="cursor: pointer;" title="Clique para inserir fala">
                    <span style="color: #8b949e; font-size: 14px; pointer-events: none;">Ativo:</span>
                    <input type="text" class="char-name-input" placeholder="Nome do Personagem" value="Jordan Ortiz" onclick="event.stopPropagation()">
                </div>
                
                <div style="display: flex; gap: 5px;">
                    <button id="btn-add-char" class="tool-btn" onclick="addCharacter()" style="border-color: #2ea043; color: #33cc33;">
                        + Adicionar Personagem
                    </button>
                    <button class="tool-btn" onclick="openManagerModal()" style="border-color: #8b949e; color: #c9d1d9;">
                        ⚙️ Gerenciar Personagens
                    </button>
                </div>
            </div>

            <div class="toolbar">
                <button class="tool-btn btn-info" onclick="insertTag('[INFO] ')">ℹ️ [INFO]</button>
                <button class="tool-btn btn-fala" onclick="insertTag('fala')">💬 FALA</button>
                <button class="tool-btn btn-me" onclick="insertTag('* ')">★ * AÇÃO</button>
                <button class="tool-btn btn-item" onclick="insertTag('$ ')">$ ITEM</button>
                <button class="tool-btn btn-cel" onclick="insertTag('# ')"># CEL</button>
                <button class="tool-btn btn-sis" onclick="insertTag('! ')">! SIS</button>
                <button class="tool-btn btn-ooc" onclick="insertTag('(( ')">(( OOC</button>
            </div>

            <div class="style-panel">
                <div class="style-header">
                    <div class="yellow-indicator"></div>
                    <span>ESTILO</span>
                </div>
                
                <div class="style-grid">
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div class="style-item">
                            <div class="style-labels">
                                <label>TAMANHO DA FONTE</label>
                                <span id="lbl-font" class="highlight-val">15px</span>
                            </div>
                            <div class="slider-row">
                                <button class="sq-btn" onclick="adjustSlider('range-font', -1)">-</button>
                                <input type="range" id="range-font" min="10" max="30" value="15" oninput="applyStyles()">
                                <button class="sq-btn" onclick="adjustSlider('range-font', 1)">+</button>
                            </div>
                        </div>

                        <div class="style-item">
                            <div class="style-labels">
                                <label>LARGURA DO BLOCO</label>
                                <span id="lbl-width" class="highlight-val">100%</span>
                            </div>
                            <input type="range" id="range-width" min="20" max="100" value="100" oninput="applyStyles()">
                        </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        <div class="style-item">
                            <div class="style-labels">
                                <label>FUNDO DO TEXTO</label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="check-bg" onchange="applyStyles()"> ATIVO
                                </label>
                            </div>
                            <div class="slider-row" style="margin-top: 5px;">
                                <input type="color" id="color-bg" class="color-picker" value="#000000" oninput="applyStyles()">
                                <input type="range" id="range-bg-op" min="0" max="100" value="70" oninput="applyStyles()">
                                <span id="lbl-bg-op" class="highlight-val" style="font-size: 11px;">70%</span>
                            </div>
                        </div>

                        <div class="style-item">
                            <div class="style-labels">
                                <label>TEXTO (Opacidade / Sombra)</label>
                                <span id="lbl-text-op" class="highlight-val">100%</span>
                            </div>
                            <div class="slider-row">
                                <span style="font-size: 10px; color: #8b949e;">OPC</span>
                                <input type="range" id="range-text-op" min="10" max="100" value="100" oninput="applyStyles()">
                            </div>
                            <div class="slider-row" style="margin-top: 5px;">
                                <span style="font-size: 10px; color: #8b949e;">SMB</span>
                                <input type="range" id="range-shadow" min="0" max="3" value="1" oninput="applyStyles()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <textarea id="chat-input" placeholder="Seu log aparecerá aqui..."></textarea>
            <button class="download-btn" onclick="downloadImage()">Baixar PNG Transparente</button>
        </div>

        <div class="preview-section">
            <h3 style="margin:0; color:#8b949e;">Visualização:</h3>
            <div class="preview-bg">
                <div id="render-box"></div>
            </div>
        </div>
    </div>

    <div id="manager-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Gerenciar Personagens</h2>
                <span class="close-btn" onclick="closeManagerModal()">&times;</span>
            </div>
            <div id="modal-char-list"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('chat-input');
        const renderBox = document.getElementById('render-box');
        let charCounter = 1;

        // Estilos
        function adjustSlider(id, amount) {
            const slider = document.getElementById(id);
            slider.value = parseInt(slider.value) + amount;
            applyStyles();
        }

        function hexToRgba(hex, opacity) {
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity / 100})`;
        }

        function applyStyles() {
            const fontSize = document.getElementById('range-font').value;
            document.getElementById('lbl-font').innerText = fontSize + 'px';
            document.documentElement.style.setProperty('--chat-font-size', fontSize + 'px');

            const width = document.getElementById('range-width').value;
            document.getElementById('lbl-width').innerText = width + '%';
            document.documentElement.style.setProperty('--chat-width', width + '%');

            const bgActive = document.getElementById('check-bg').checked;
            const bgColor = document.getElementById('color-bg').value;
            const bgOp = document.getElementById('range-bg-op').value;
            document.getElementById('lbl-bg-op').innerText = bgOp + '%';
            
            if (bgActive) {
                document.documentElement.style.setProperty('--chat-bg', hexToRgba(bgColor, bgOp));
            } else {
                document.documentElement.style.setProperty('--chat-bg', 'transparent');
            }

            const textOp = document.getElementById('range-text-op').value;
            document.getElementById('lbl-text-op').innerText = textOp + '%';
            document.documentElement.style.setProperty('--chat-text-opacity', textOp / 100);

            const shadowStr = document.getElementById('range-shadow').value;
            if (shadowStr == 0) {
                document.documentElement.style.setProperty('--chat-shadow', 'none');
            } else {
                const s = shadowStr + 'px';
                const shadowVal = `
                    -${s} -${s} 0 #000,  ${s} -${s} 0 #000,
                    -${s}  ${s} 0 #000,  ${s}  ${s} 0 #000,
                     0px -${s} 0 #000,  0px  ${s} 0 #000,
                    -${s}  0px 0 #000,  ${s}  0px 0 #000
                `;
                document.documentElement.style.setProperty('--chat-shadow', shadowVal);
            }
        }
        applyStyles();

        // Personagens
        function insertSpecificCharacter(element) {
            const inputField = element.querySelector('.char-name-input');
            const name = inputField.value.trim() || 'Nome_Sobrenome';
            const textToAdd = `${name} diz: `;
            if (input.value.length > 0 && !input.value.endsWith('\n')) input.value += '\n';
            input.value += textToAdd;
            input.focus();
            updatePreview();
        }

        function addCharacter() {
            charCounter++;
            const container = document.getElementById('characters-container');
            const actionButtons = container.querySelector('div[style*="display: flex; gap: 5px;"]');
            
            const newCharDiv = document.createElement('div');
            newCharDiv.className = 'character-setup';
            newCharDiv.id = 'char-' + charCounter;
            newCharDiv.style.cursor = 'pointer';
            newCharDiv.title = 'Clique para inserir fala';
            newCharDiv.onclick = function() { insertSpecificCharacter(this); };
            
            newCharDiv.innerHTML = `
                <span style="color: #8b949e; font-size: 14px; pointer-events: none;">Ativo:</span>
                <input type="text" class="char-name-input" placeholder="Nome_Sobrenome" value="Novo_Personagem" onclick="event.stopPropagation()">
            `;
            container.insertBefore(newCharDiv, actionButtons);
        }

        function openManagerModal() {
            const modalList = document.getElementById('modal-char-list');
            modalList.innerHTML = ''; 
            const charSetups = document.querySelectorAll('.character-setup');
            
            if (charSetups.length === 0) modalList.innerHTML = '<span style="color: #8b949e;">Nenhum personagem ativo.</span>';

            charSetups.forEach(setup => {
                const mainInput = setup.querySelector('.char-name-input');
                const row = document.createElement('div');
                row.className = 'manage-row';
                
                const editInput = document.createElement('input');
                editInput.type = 'text';
                editInput.value = mainInput.value;
                editInput.oninput = function(e) { mainInput.value = e.target.value; };
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-delete-char';
                deleteBtn.innerText = 'Excluir';
                deleteBtn.onclick = function() {
                    setup.remove(); 
                    row.remove();   
                    if (document.querySelectorAll('.character-setup').length === 0) {
                        modalList.innerHTML = '<span style="color: #8b949e;">Nenhum personagem ativo.</span>';
                    }
                };
                
                row.appendChild(editInput);
                row.appendChild(deleteBtn);
                modalList.appendChild(row);
            });
            document.getElementById('manager-modal').style.display = 'flex';
        }

        function closeManagerModal() { document.getElementById('manager-modal').style.display = 'none'; }

        function insertTag(tag) {
            let insertText = tag;
            if (tag === 'fala') {
                const firstInput = document.querySelector('.char-name-input');
                const name = firstInput ? firstInput.value.trim() : 'Nome_Sobrenome';
                insertText = `${name} diz: `;
            }
            input.value += (input.value.length > 0 && !input.value.endsWith('\n') ? '\n' : '') + insertText;
            input.focus();
            updatePreview(); 
        }

        // Preview e Regex para os novos Símbolos
        input.addEventListener('input', updatePreview);

        function updatePreview() {
            const lines = input.value.split('\n');
            renderBox.innerHTML = '';

            lines.forEach(line => {
                if (line.trim() === '') return;

                const div = document.createElement('div');
                div.className = 'chat-line';

                // LÓGICA ATUALIZADA COM OS NOVOS SÍMBOLOS E RETROCOMPATIBILIDADE
                if (line.startsWith('[INFO] ')) {
                    const spanBr1 = document.createElement('span'); spanBr1.textContent = '['; spanBr1.className = 'color-normal';
                    const spanInfo = document.createElement('span'); spanInfo.textContent = 'INFO'; spanInfo.className = 'color-info-tag';
                    const spanBr2 = document.createElement('span'); spanBr2.textContent = '] '; spanBr2.className = 'color-normal';
                    const spanText = document.createElement('span'); spanText.textContent = line.substring(7); spanText.className = 'color-normal';
                    div.append(spanBr1, spanInfo, spanBr2, spanText);
                } 
                // Ação: * ou /me ou /do
                else if (line.startsWith('*') || line.startsWith('/me ') || line.startsWith('/do ')) {
                    let text = line;
                    if (line.startsWith('/me ') || line.startsWith('/do ')) {
                        text = '*' + line.substring(4);
                    } else if (!line.startsWith('* ')) {
                        text = '* ' + line.substring(1).trim();
                    }
                    div.textContent = text; 
                    div.classList.add('color-action');
                } 
                // Item: $ ou /item
                else if (line.startsWith('$') || line.startsWith('/item ')) {
                    let text = line.startsWith('$') ? line.substring(1).trim() : line.substring(6);
                    div.textContent = text; 
                    div.classList.add('color-item');
                } 
                // Celular: # ou /cel
                else if (line.startsWith('#') || line.startsWith('/cel ')) {
                    let text = line.startsWith('#') ? line.substring(1).trim() : line.substring(5);
                    div.textContent = text; 
                    div.classList.add('color-cel');
                } 
                // Sistema: ! ou /sis
                else if (line.startsWith('!') || line.startsWith('/sis ')) {
                    let text = line.startsWith('!') ? line.substring(1).trim() : line.substring(5);
                    div.textContent = text; 
                    div.classList.add('color-sis');
                } 
                // OOC
                else if (line.startsWith('(( ') || line.startsWith('((')) {
                    let text = line;
                    if (!text.endsWith('))')) text += ' ))';
                    div.textContent = text; 
                    div.classList.add('color-ooc');
                } else if (line.startsWith('/ooc ')) {
                    div.textContent = '(( ' + line.substring(5) + ' ))'; 
                    div.classList.add('color-ooc');
                } 
                // Normal
                else {
                    div.textContent = line; 
                    div.classList.add('color-normal');
                }
                
                renderBox.appendChild(div);
            });
        }

        // Download
        function downloadImage() {
            if (renderBox.innerHTML.trim() === '') {
                alert('O chatlog está vazio! Adicione algum texto primeiro.');
                return;
            }
            html2canvas(renderBox, {
                backgroundColor: null,
                scale: 2 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'chatlog-lore.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
